# Docker Compose for Python Ingest Service with MongoDB
# Parcel State Tracker Platform

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: parcel-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-admin123}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    networks:
      - parcel-tracker-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Python Ingest Service
  service-ingest-python:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parcel-tracker-ingest-python
    restart: unless-stopped
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-admin123}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-parcel_tracker}
      MONGODB_AUTH_SOURCE: admin
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: 5000
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - parcel-tracker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Express - Web-based MongoDB admin interface
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: parcel-tracker-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGODB_USERNAME:-admin}:${MONGODB_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: ${MONGO_EXPRESS_AUTH:-true}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express123}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - parcel-tracker-network

# Named volumes
volumes:
  mongodb_data:
    driver: local

# Custom network for service communication
networks:
  parcel-tracker-network:
    driver: bridge
